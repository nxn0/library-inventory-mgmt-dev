{% extends 'admin/base.html' %}

{% block title %}Read EPUB - {{ book.title }}{% endblock %}

{% block content %}
<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Read EPUB: {{ book.title }}</h2>
        <a class="btn btn-secondary" href="{% url 'resource_list' %}">Back to Resource Manager</a>
    </div>

    <div id="epub-viewer" style="height: 80vh; border:1px solid #ddd;
         position: relative; background: #f8f9fa;
         overflow: hidden;
         "></div>

    <div class="mt-3">
        <p>If this reader does not display, use this link:</p>
        <p><a href="{{ book_url }}" target="_blank" rel="noopener">Open EPUB directly</a></p>
        <a class="btn btn-primary" href="{{ book_url }}" target="_blank">Download EPUB</a>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.css" />
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.js"></script>
<script>
    const bookUrl = '{{ book_url }}';
    const book = ePub(bookUrl);
    const rendition = book.renderTo('epub-viewer', {
        width: '100%', height: '100%', spread: 'always'
    });

    rendition.display();

    // Basic controls
    const next = document.createElement('button');
    next.textContent = 'Next';
    next.className = 'btn btn-outline-secondary btn-sm';
    next.style.position='absolute'; next.style.bottom='10px'; next.style.right='10px';

    const prev = document.createElement('button');
    prev.textContent = 'Prev';
    prev.className = 'btn btn-outline-secondary btn-sm';
    prev.style.position='absolute'; prev.style.bottom='10px'; prev.style.left='10px';

    document.querySelector('#epub-viewer').appendChild(prev);
    document.querySelector('#epub-viewer').appendChild(next);

    next.addEventListener('click', function() {
        rendition.next();
    });

    prev.addEventListener('click', function() {
        rendition.prev();
    });

    book.ready.then(function() {
        console.log('EPUB loaded');
    }).catch(function(err){
        document.getElementById('epub-viewer').innerHTML = '<div class="alert alert-danger p-3">Could not load EPUB file.</div>';
        console.error(err);
    });
</script>
{% endblock %}
